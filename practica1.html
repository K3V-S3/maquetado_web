<!DOCTYPE html>

<!-- Esto le dice al navegador:
“Oye, lo que viene es HTML5, no inventes cosas raras.” -->


<html lang="en">
    <!-- Es la raíz de todo el documento. Todo vive dentro de esto. -->
<head>
    <!-- Aquí va la información interna, no visible directamente en la página.
Es como el cerebro, no la cara. -->
    <meta charset="UTF-8">
    <!-- Define la codificación de caracteres.
En palabras simples: permite usar acentos, ñ, símbolos sin que salgan cosas raras tipo Ã± -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Esto hace que la página se vea bien en celulares.
Sin esto, tu web se vería como una miniatura inútil en el teléfono -->
    <title>Document</title>
    <!-- Es el nombre que aparece en la pestaña del navegador. -->
</head>
<!-- Es la parte no visible de la página.
Ahí metes cosas como:

Configuración (meta)
Título
Enlaces a CSS
Scripts (a veces)

Es básicamente el backstage del HTML -->
<body>
    ✅
    <!-- Aquí va todo lo visible:
texto, imágenes, botones, etc. -->
    <a href="/practica8.html">Volver</a>
</body>
<!-- Esto es simplemente el cierre del <body> -->
</html>
<!-- Cierra todo. Como cerrar la puerta cuando te vas… o se te mete algo raro -->
