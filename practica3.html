<!DOCTYPE html>
<!-- Indica que usamos HTML5 -->

<html lang="es">
<!-- Cambié "en" por "es" porque el contenido está en español -->

<head>
    <meta charset="UTF-8">
    <!-- Permite usar tildes, ñ y caracteres especiales correctamente -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Hace que la página se vea bien en celulares -->

    <title>Ejemplo de títulos</title>
    <!-- Cambia este título por algo más descriptivo -->

</head>

<body>
    <!-- Todo lo que pongas aquí será visible en la página -->

    <!-- Títulos en HTML -->
    <!-- SOLO debe haber un <h1> por página (regla recomendada para SEO y orden) -->
    <h1>Título principal o de primer orden</h1>

    <!-- Usa los demás títulos en orden, no te los saltes como loco -->
    <h2>Título de segundo orden</h2>
    <h3>Título de tercer orden</h3>
    <h4>Título de cuarto orden</h4>
    <h5>Título de quinto orden</h5>
    <h6>Título de sexto orden</h6>

    <!-- Recomendación:
         No uses los <h1>-<h6> solo para hacer texto grande o pequeño.
         Son para estructura, no para diseño (eso es trabajo de CSS). -->

    <!-- Ejemplo de mejora: añadir contenido real -->
    <!--
    <p>Este sería un párrafo explicando el tema del título.</p>
    -->

</body>

</html>
