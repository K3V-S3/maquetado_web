<!DOCTYPE html>
<!-- Define que el documento usa HTML5 -->

<html lang="es">
<!-- Idioma del documento (mejor en español si el contenido está en español) -->

<head>
    <meta charset="UTF-8">
    <!-- Permite usar caracteres especiales como ñ, tildes, etc -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Hace que la página sea responsive (se adapte a celulares) -->

    <title>Lista en HTML</title>
    <!-- Título que aparece en la pestaña del navegador -->
</head>

<body>
    <!-- Todo lo visible en la página -->

    <!-- Lista desordenada -->
    <!-- <ul> significa "unordered list" (lista sin orden, con viñetas) -->
    <ul>

        <!-- <li> significa "list item" (elemento de la lista) -->
        <li>Elemento 1</li>

        <!-- Cada <li> representa un ítem dentro de la lista -->
        <li>Elemento 2</li>

        <!-- Puedes tener tantos <li> como necesites -->
        <li>Elemento 3</li>

    </ul>

    <!-- Recomendaciones:
         - Siempre usa <li> dentro de <ul> o <ol>
         - No pongas texto suelto dentro de <ul>
         - Usa <ul> cuando el orden no importa
         - Usa <ol> si necesitas numeración
    -->

</body>
</html>
